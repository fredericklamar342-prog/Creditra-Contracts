name: CI

on:
  push:
    branches: [main, master, develop, "feature/**"]
  pull_request:
    branches: [main, master, develop]

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Format, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Lint (clippy)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cov-

      - name: Enforce line coverage >= 95%
        run: cargo llvm-cov --workspace --all-targets --fail-under-lines 95

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Build contract (WASM)
        run: cargo build --release --target wasm32-unknown-unknown -p creditra-credit

      - name: Verify WASM size threshold
        run: |
          set -euo pipefail
          WASM_PATH="target/wasm32-unknown-unknown/release/creditra_credit.wasm"
          if [ ! -f "$WASM_PATH" ]; then
            echo "::error::WASM artifact not found at $WASM_PATH"
            exit 1
          fi

          # Cross-platform stat (GNU or BSD/macOS)
          if stat --format="%s" "$WASM_PATH" >/dev/null 2>&1; then
            SIZE_BYTES=$(stat --format="%s" "$WASM_PATH")
          elif stat -f "%z" "$WASM_PATH" >/dev/null 2>&1; then
            SIZE_BYTES=$(stat -f "%z" "$WASM_PATH")
          else
            echo "::error::Could not determine WASM file size using stat"
            exit 1
          fi

          THRESHOLD_BYTES=51200
          echo "WASM size: ${SIZE_BYTES} bytes ($((SIZE_BYTES / 1024)) KB)"
          echo "Threshold: ${THRESHOLD_BYTES} bytes (50 KB)"
          echo "::notice::WASM size is ${SIZE_BYTES} bytes. Threshold is ${THRESHOLD_BYTES} bytes."

          if [ "${SIZE_BYTES}" -gt "${THRESHOLD_BYTES}" ]; then
            echo "::error::WASM size ${SIZE_BYTES} exceeds threshold ${THRESHOLD_BYTES}."
            exit 1
          fi

