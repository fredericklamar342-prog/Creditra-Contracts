name: Build WASM

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Build WASM
        run: cargo build --release -p creditra-credit --target wasm32-unknown-unknown

      - name: Verify WASM size threshold
        run: |
          set -euo pipefail
          WASM_PATH="target/wasm32-unknown-unknown/release/creditra_credit.wasm"
          if [ ! -f "$WASM_PATH" ]; then
            echo "::error::WASM artifact not found at $WASM_PATH"
            exit 1
          fi

          if stat --format="%s" "$WASM_PATH" >/dev/null 2>&1; then
            SIZE_BYTES=$(stat --format="%s" "$WASM_PATH")
          elif stat -f "%z" "$WASM_PATH" >/dev/null 2>&1; then
            SIZE_BYTES=$(stat -f "%z" "$WASM_PATH")
          else
            echo "::error::Could not determine WASM file size using stat"
            exit 1
          fi

          THRESHOLD_BYTES=51200
          echo "WASM size: ${SIZE_BYTES} bytes ($((SIZE_BYTES / 1024)) KB)"
          echo "Threshold: ${THRESHOLD_BYTES} bytes (50 KB)"
          echo "::notice::WASM size is ${SIZE_BYTES} bytes. Threshold is ${THRESHOLD_BYTES} bytes."

          if [ "${SIZE_BYTES}" -gt "${THRESHOLD_BYTES}" ]; then
            echo "::error::WASM size ${SIZE_BYTES} exceeds threshold ${THRESHOLD_BYTES}."
            exit 1
          fi
